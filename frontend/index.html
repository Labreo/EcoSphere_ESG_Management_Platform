<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoSphere | ESG Management Platform</title>
  <meta name="description" content="A premium, state-of-the-art ESG management and gamification platform for organizations.">
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container app-container-horizontal">
    <!-- Sleek, edge-to-edge dark horizontal top header bar -->
    <header class="app-top-nav-bar">
      <div class="nav-logo-wrapper">
        <div class="logo-icon">🌱</div>
        <span class="logo-text">EcoSphere</span>
      </div>
      <nav class="horizontal-nav" id="horizontal-nav">
        <a href="#dashboard" class="nav-link-horizontal" id="link-dashboard">Dashboard</a>
        <a href="#environmental/goals" class="nav-link-horizontal" id="link-environmental">Environmental</a>
        <a href="#social/csr-activities" class="nav-link-horizontal" id="link-social">Social</a>
        <a href="#governance/policies" class="nav-link-horizontal" id="link-governance">Governance</a>
        <a href="#gamification/challenges" class="nav-link-horizontal" id="link-gamification">Gamification</a>
        <a href="#reports/environmental-report" class="nav-link-horizontal" id="link-reports">Reports</a>
        <a href="#settings/departments" class="nav-link-horizontal" id="link-settings">Settings</a>
      </nav>
      <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Toggle navigation menu">
        <i data-lucide="menu"></i>
      </button>
    </header>
    <!-- Mobile nav backdrop overlay -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <!-- Main Content Area -->
    <main class="app-main-content-horizontal">
      <!-- Page Viewport -->
      <div class="content-viewport-horizontal" id="content-viewport">
        <!-- Component Content gets injected here -->
      </div>
    </main>
  </div>

  <!-- Main JS Logic -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
