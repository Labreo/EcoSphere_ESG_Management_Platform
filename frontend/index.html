<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoSphere | ESG Management Platform</title>
  <meta name="description" content="A premium, state-of-the-art ESG management and gamification platform for organizations.">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Lucide Icons (self-hosted) -->
  <script src="js/lib/lucide.min.js"></script>
  <script>
    window.addEventListener('error', function(e) {
      var div = document.getElementById('debug-error-banner');
      if (!div) {
        div = document.createElement('div');
        div.id = 'debug-error-banner';
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;padding:15px;background:#FEE2E2;color:#991B1B;border-bottom:2px solid #EF4444;z-index:999999;font-family:monospace;font-size:13px;white-space:pre-wrap;box-sizing:border-box;';
        document.body.appendChild(div);
      }
      div.innerHTML += '<div><strong>Error:</strong> ' + e.message + ' at ' + e.filename + ':' + e.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      var div = document.getElementById('debug-error-banner');
      if (!div) {
        div = document.createElement('div');
        div.id = 'debug-error-banner';
        div.style.cssText = 'position:fixed;top:0;left:0;width:100%;padding:15px;background:#FEE2E2;color:#991B1B;border-bottom:2px solid #EF4444;z-index:999999;font-family:monospace;font-size:13px;white-space:pre-wrap;box-sizing:border-box;';
        document.body.appendChild(div);
      }
      div.innerHTML += '<div><strong>Unhandled Promise:</strong> ' + (e.reason ? (e.reason.message || e.reason) : 'Unknown') + '</div>';
    });
  </script>
</head>
<body>
  <div class="app-container app-container-horizontal">
    <!-- Sleek, edge-to-edge dark horizontal top header bar -->
    <header class="app-top-nav-bar">
      <div class="nav-logo-wrapper">
        <div class="logo-icon">🌱</div>
        <span class="logo-text">EcoSphere</span>
      </div>
        <nav class="horizontal-nav" id="horizontal-nav">
          <a href="#dashboard" class="nav-link-horizontal" id="link-dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
          <a href="#chatbot" class="nav-link-horizontal" id="link-chatbot"><i data-lucide="bot"></i> EcoBot AI</a>
          <a href="#environmental/goals" class="nav-link-horizontal" id="link-environmental"><i data-lucide="leaf"></i> Environmental</a>
          <a href="#social/csr-activities" class="nav-link-horizontal" id="link-social"><i data-lucide="users"></i> Social</a>
          <a href="#governance/policies" class="nav-link-horizontal" id="link-governance"><i data-lucide="shield"></i> Governance</a>
          <a href="#gamification/challenges" class="nav-link-horizontal" id="link-gamification"><i data-lucide="award"></i> Gamification</a>
          <a href="#reports/environmental-report" class="nav-link-horizontal" id="link-reports"><i data-lucide="bar-chart-3"></i> Reports</a>
          <a href="#settings/departments" class="nav-link-horizontal" id="link-settings"><i data-lucide="settings"></i> Settings</a>
          <a href="#profile" class="nav-link-horizontal nav-profile-link" id="link-profile"><i data-lucide="user"></i> Profile</a>
        </nav>
      <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="Toggle navigation menu">
        <i data-lucide="menu"></i>
      </button>
    </header>
    <!-- Mobile nav backdrop overlay -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <!-- Main Content Area -->
    <main class="app-main-content-horizontal">
      <!-- Page Viewport -->
      <div class="content-viewport-horizontal" id="content-viewport">
        <!-- Component Content gets injected here -->
      </div>
    </main>
  </div>

  <!-- Main JS Logic -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
